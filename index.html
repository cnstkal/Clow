<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLOW Official</title>

<style>
{box-sizing:border-box}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
background:#eee7df;
color:#171313;
}

.app{
width:min(430px,100%);
min-height:100vh;
margin:0 auto;
background:#fbf7f2;
}

/ 상단 /
header{
position:sticky;
top:0;
z-index:10;
padding:16px 14px;
background:#fbf7f2;
border-bottom:1px solid #ddd;
}

.logo{
font-weight:900;
letter-spacing:.12em;
}

.tabs{
display:flex;
gap:8px;
margin-top:12px;
overflow:auto;
}

.tab{
padding:8px 14px;
border-radius:999px;
border:1px solid #ddd;
background:#fff;
font-size:13px;
}

.tab.active{
background:#171313;
color:#fff;
}

/ 페이지 /
.page{
display:none;
padding:20px 14px 40px;
}

.page.active{
display:block;
}

/ 히어로 /
.hero{
border-radius:26px;
padding:20px;
color:#fff;
background:linear-gradient(135deg,#211d2a,#a474b3,#f4b59d);
margin-bottom:18px;
}

h1{
font-size:44px;
margin:0;
}

/ 카드 /
.card{
background:#fff;
border-radius:20px;
padding:16px;
margin-bottom:14px;
}

/ 리스트 /
.list{
display:flex;
flex-direction:column;
gap:14px;
}

/ 버튼 /
.btn{
border:0;
border-radius:999px;
padding:10px;
background:#171313;
color:#fff;
width:100%;
margin-top:10px;
}

/ 입력 /
input, textarea{
width:100%;
padding:10px;
margin-top:8px;
border-radius:12px;
border:1px solid #ddd;
}

/ 커뮤니티 /
.post{
background:#fff;
border-radius:18px;
padding:14px;
}

.post img{
width:100%;
border-radius:14px;
margin-top:10px;
}

/ 달력 /
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
margin-bottom:16px;
}

.day{
padding:10px 0;
border-radius:10px;
background:#f3ece5;
font-size:12px;
}

.day.active{
background:#171313;
color:#fff;
}
</style>
</head>

<body>
<div class="app">

<header>
<div class="logo">CLOW</div>
<div class="tabs">
<button class="tab active" onclick="show('home',this)">Home</button>
<button class="tab" onclick="show('community',this)">Community</button>
<button class="tab" onclick="show('schedule',this)">Schedule</button>
</div>
</header>

<!-- HOME -->
<section id="home" class="page active">
<div class="hero">
<h1>Clow</h1>
<p>모바일 공식 앱 스타일</p>
</div>

<div class="card">
<b>Editable</b>
<p>모든 데이터는 브라우저에 저장됨</p>
</div>
</section>

<!-- COMMUNITY -->
<section id="community" class="page">

<div class="card">
<input id="nick" placeholder="닉네임">
<textarea id="text" placeholder="글 작성"></textarea>
<input type="file" id="img">
<button class="btn" onclick="post()">올리기</button>
</div>

<div id="posts" class="list"></div>

</section>

<!-- SCHEDULE -->
<section id="schedule" class="page">

<div class="calendar" id="calendar"></div>

<div class="card">
<input id="date" type="date">
<input id="title" placeholder="제목">
<button class="btn" onclick="addSchedule()">추가</button>
</div>

<div id="scheduleList" class="list"></div>

</section>

</div>

<script>

/ 탭 /
function show(id,el){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
document.getElementById(id).classList.add('active')
el.classList.add('active')
}

/ 로컬 저장 /
let data=JSON.parse(localStorage.getItem('clow')||'{"posts":[],"schedule":[]}')

function save(){
localStorage.setItem('clow',JSON.stringify(data))
}

/ 이미지 압축 /
function compress(file){
return new Promise(res=>{
if(!file) return res('')
let r=new FileReader()
r.onload=()=>{
let img=new Image()
img.onload=()=>{
let canvas=document.createElement('canvas')
let scale=600/Math.max(img.width,img.height)
canvas.width=img.widthscale
canvas.height=img.heightscale
canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height)
res(canvas.toDataURL('image/jpeg',0.7))
}
img.src=r.result
}
r.readAsDataURL(file)
})
}

/ 게시글 /
async function post(){
let imgFile=document.getElementById('img').files[0]
let img=await compress(imgFile)

data.posts.unshift({
nick:nick.value||'fan',
text:text.value,
img
})

save()
renderPosts()

nick.value=''
text.value=''
img.value=''
}

function renderPosts(){
posts.innerHTML=data.posts.map(p=> <div class="post"> <b>${p.nick}</b> <p>${p.text}</p> ${p.img?<img src="${p.img}">:''} </div> ).join('')
}

/ 스케줄 /
function addSchedule(){
data.schedule.push({
date:date.value,
title:title.value
})
save()
renderSchedule()
}

function renderSchedule(){
scheduleList.innerHTML=data.schedule.map(s=><div class="card"> <b>${s.date}</b> <p>${s.title}</p> </div>).join('')
}

/ 달력 /
function renderCalendar(){
let html=''
for(let i=1;i<=30;i++){
html+=<div class="day">${i}</div>
}
calendar.innerHTML=html
}

/ 초기 */
renderPosts()
renderSchedule()
renderCalendar()

</script>

</body>
</html>
